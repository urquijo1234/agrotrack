name: AgroTrack CI

on:
  push:
    branches:
      - main
      - develop
      - 'fix/**'
      - 'feature/**'
      - 'predio/**'
      - 'auth-module'
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile_app # Esto obliga a todos los comandos a ejecutarse aquí
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0' # Asegúrate que sea la tuya, ej: 3.27.0
          channel: 'stable'
          cache: true
          
      - name: Limpiar y obtener dependencias
        run: |
          flutter clean
          flutter pub get
        
      - name: Análisis estático
        run: flutter analyze || true
        
      - name: Correr pruebas
        run: flutter test
        
      - name: Build APK debug
        run: flutter build apk --debug
        
      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: agrotrack-debug-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7

  release:
    name: Release APK
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: mobile_app
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'
          cache: true
          
      - name: Instalar dependencias
        run: flutter pub get
        
      - name: Build APK debug
        run: flutter build apk --debug
        
      - name: Crear Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "AgroTrack Build #${{ github.run_number }}"
          body: |
            Build automático generado desde el commit ${{ github.sha }}
          files: mobile_app/build/app/outputs/flutter-apk/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
