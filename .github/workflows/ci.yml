name: AgroTrack CI

on:
  push:
    branches:
      - main
      - develop
      - 'fix/**'
      - 'feature/**'
      - 'predio/**'
      - 'auth-module'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.7'
          channel: 'stable'
          cache: true

      - name: Instalar dependencias
        working-directory: mobile_app
        run: flutter pub get

      - name: Análisis estático
        working-directory: mobile_app
        run: flutter analyze

      - name: Correr pruebas unitarias
        working-directory: mobile_app
        run: flutter test test/unit --coverage

      - name: Correr pruebas de integración
        working-directory: mobile_app
        run: flutter test test/integration --coverage

      - name: Build APK debug
        working-directory: mobile_app
        run: flutter build apk --debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: agrotrack-debug-apk
          path: mobile_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7
