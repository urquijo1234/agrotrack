<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AgroTrack — Informes ICA</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F7F9F5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2E7D32;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header .logo {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 800;
    }

    header p {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 2px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px;
      flex: 1;
      width: 100%;
    }

    .card {
      background: white;
      border-radius: 16px;
      border: 1px solid #D7DED3;
      padding: 20px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 16px;
      font-weight: 800;
      color: #1F2937;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card h2 span.badge {
      background: #EDF7EE;
      color: #2E7D32;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      font-weight: 700;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-item {
      background: #F4F7F2;
      border-radius: 10px;
      padding: 10px 12px;
    }

    .info-item .label {
      font-size: 11px;
      color: #6B7280;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .info-item .value {
      font-size: 14px;
      color: #1F2937;
      font-weight: 700;
    }

    .pdf-container {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #D7DED3;
      background: #374151;
    }

    iframe {
      width: 100%;
      height: 70vh;
      border: none;
      display: block;
    }

    .loading {
      text-align: center;
      padding: 48px 24px;
      color: #6B7280;
    }

    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E5E7EB;
      border-top-color: #2E7D32;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-state {
      text-align: center;
      padding: 48px 24px;
      color: #6B7280;
    }

    .error-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .error-state h3 {
      font-size: 18px;
      font-weight: 700;
      color: #1F2937;
      margin-bottom: 8px;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #2E7D32;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      margin-top: 16px;
      transition: background 0.2s;
    }

    .btn-download:hover {
      background: #1B5E20;
    }

    .not-found {
      text-align: center;
      padding: 80px 24px;
    }

    .not-found .icon { font-size: 64px; margin-bottom: 16px; }
    .not-found h2 {
      font-size: 22px;
      font-weight: 800;
      color: #1F2937;
      margin-bottom: 8px;
    }
    .not-found p { color: #6B7280; font-size: 14px; }

    footer {
      text-align: center;
      padding: 20px;
      color: #9CA3AF;
      font-size: 12px;
      border-top: 1px solid #E5E7EB;
      background: white;
    }

    @media (max-width: 600px) {
      .info-grid { grid-template-columns: 1fr; }
      iframe { height: 60vh; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🌱</div>
  <div>
    <h1>AgroTrack</h1>
    <p>Informes Fitosanitarios ICA</p>
  </div>
</header>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Cargando informe...</p>
  </div>
</div>

<footer>
  AgroTrack 
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA2stdZRW-JenZm2BRT-Xa6FesTaBmtOKg",
    authDomain: "agrotrack-a435e.firebaseapp.com",
    projectId: "agrotrack-a435e",
    storageBucket: "agrotrack-a435e.firebasestorage.app",
    messagingSenderId: "402460744062",
    appId: "1:402460744062:web:5578118338758d9dd9bb2f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const app_div = document.getElementById("app");

  // Obtener el informeId de la URL
  // Soporta: /?id=INFORME_ID o /informe/INFORME_ID
  function getInformeId() {
    const params = new URLSearchParams(window.location.search);
    if (params.get("id")) return params.get("id");

    const path = window.location.pathname;
    const match = path.match(/\/informe\/([^/]+)/);
    if (match) return match[1];

    return null;
  }

  function labelPeriodo(periodo) {
    const map = {
      FEB_MAR_ABR: "Febrero - Marzo - Abril",
      MAY_JUN_JUL: "Mayo - Junio - Julio",
      AGO_SEP_OCT: "Agosto - Septiembre - Octubre",
      NOV_DIC_ENE: "Noviembre - Diciembre - Enero",
    };
    return map[periodo] || periodo;
  }

  function labelEstado(estado) {
    const map = {
      BORRADOR: "Borrador",
      EMITIDO: "Emitido",
      EXPORTADO: "Exportado",
    };
    return map[estado] || estado;
  }

  async function cargarInforme() {
    const informeId = getInformeId();

    if (!informeId) {
      app_div.innerHTML = `
        <div class="not-found">
          <div class="icon">📋</div>
          <h2>Bienvenido a AgroTrack</h2>
          <p>Escanea el código QR de un informe para ver su contenido.</p>
        </div>
      `;
      return;
    }

    try {
      const docRef = doc(db, "informesFitosanitarios", informeId);
      const docSnap = await getDoc(docRef);

      if (!docSnap.exists()) {
        app_div.innerHTML = `
          <div class="not-found">
            <div class="icon">🔍</div>
            <h2>Informe no encontrado</h2>
            <p>El informe solicitado no existe o fue eliminado.</p>
          </div>
        `;
        return;
      }

      const informe = docSnap.data();

      // Si no hay PDF todavía
      if (!informe.urlPdf) {
        app_div.innerHTML = `
          <div class="card">
            <div class="error-state">
              <div class="icon">⏳</div>
              <h3>PDF en generación</h3>
              <p>El informe fue emitido pero el PDF aún se está generando.<br>
              Intenta de nuevo en unos minutos.</p>
            </div>
          </div>
        `;
        return;
      }

      const fechaEmision = informe.fechaEmision
        ? new Date(informe.fechaEmision).toLocaleDateString("es-CO", {
            year: "numeric", month: "long", day: "numeric"
          })
        : "N/A";

      app_div.innerHTML = `
        <div class="card">
          <h2>
            📄 Informe Fitosanitario ICA
            <span class="badge">${labelEstado(informe.estadoInforme)}</span>
          </h2>
          <div class="info-grid">
            <div class="info-item">
              <div class="label">Periodo</div>
              <div class="value">${labelPeriodo(informe.periodoReportado)}</div>
            </div>
            <div class="info-item">
              <div class="label">Año</div>
              <div class="value">${informe.anioReporte}</div>
            </div>
            <div class="info-item">
              <div class="label">Predio</div>
              <div class="value">${informe.nombrePredioReportado}</div>
            </div>
            <div class="info-item">
              <div class="label">Titular</div>
              <div class="value">${informe.nombreTitularReportado}</div>
            </div>
            <div class="info-item">
              <div class="label">Ubicación</div>
              <div class="value">${informe.municipioReportado}, ${informe.departamentoReportado}</div>
            </div>
            <div class="info-item">
              <div class="label">Fecha emisión</div>
              <div class="value">${fechaEmision}</div>
            </div>
          </div>

          <div style="margin-top: 16px; text-align: center;">
  <a href="${informe.urlPdfDirecto || informe.urlPdf}" 
     target="_blank" 
     class="btn-download">
    ⬇️ Descargar PDF
  </a>
</div>

        <div class="card">
          <h2>📑 Documento</h2>
          <div class="pdf-container">
  <iframe
    src="${informe.urlPdfDirecto || informe.urlPdf}"
    title="Informe Fitosanitario ICA">
  </iframe>
</div>
      `;

    } catch (error) {
      console.error("Error cargando informe:", error);
      app_div.innerHTML = `
        <div class="card">
          <div class="error-state">
            <div class="icon">⚠️</div>
            <h3>Error al cargar</h3>
            <p>No fue posible cargar el informe. Verifica tu conexión e intenta de nuevo.</p>
          </div>
        </div>
      `;
    }
  }

  cargarInforme();
</script>

</body>
</html>
